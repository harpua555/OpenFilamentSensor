name: Actions Storage Cleanup

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      keep_runs:
        description: 'How many recent runs to keep per workflow'
        required: true
        default: '5'

permissions:
  actions: write
  contents: read

concurrency:
  group: actions-storage-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    name: Prune old workflow runs and caches
    runs-on: ubuntu-latest
    env:
      KEEP_RUNS: ${{ github.event.inputs.keep_runs || '5' }}
    steps:
      - name: Delete old workflow runs and all Actions caches
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const keepRuns = Math.max(parseInt(process.env.KEEP_RUNS || '5', 10), 1);

            core.info(`Repository: ${owner}/${repo}`);
            core.info(`Keeping newest ${keepRuns} run(s) per workflow.`);

            const workflows = await github.paginate(
              github.rest.actions.listRepoWorkflows,
              { owner, repo, per_page: 100 }
            );

            let deletedRuns = 0;
            for (const workflow of workflows) {
              const runs = await github.paginate(
                github.rest.actions.listWorkflowRuns,
                { owner, repo, workflow_id: workflow.id, per_page: 100 }
              );

              let keptCount = 0;
              let workflowDeleted = 0;

              for (const run of runs) {
                if (keptCount < keepRuns) {
                  keptCount += 1;
                  continue;
                }

                if (run.status !== 'completed') {
                  core.info(`Skipping active run ${run.id} (${workflow.name}) with status '${run.status}'.`);
                  continue;
                }

                try {
                  await github.request('DELETE /repos/{owner}/{repo}/actions/runs/{run_id}', {
                    owner,
                    repo,
                    run_id: run.id,
                  });
                  workflowDeleted += 1;
                  deletedRuns += 1;
                } catch (error) {
                  core.warning(`Failed deleting run ${run.id} (${workflow.name}): ${error.message}`);
                }
              }

              core.info(`Workflow '${workflow.name}': total=${runs.length}, kept=${Math.min(runs.length, keepRuns)}, deleted=${workflowDeleted}`);
            }

            const caches = await github.paginate(
              github.rest.actions.getActionsCacheList,
              { owner, repo, per_page: 100 }
            );

            let deletedCaches = 0;
            for (const cache of caches) {
              try {
                await github.request('DELETE /repos/{owner}/{repo}/actions/caches/{cache_id}', {
                  owner,
                  repo,
                  cache_id: cache.id,
                });
                deletedCaches += 1;
              } catch (error) {
                core.warning(`Failed deleting cache ${cache.id} (${cache.key}): ${error.message}`);
              }
            }

            core.notice(`Cleanup complete. Deleted runs: ${deletedRuns}. Deleted caches: ${deletedCaches}.`);
